services:
  pdns-api-proxy:
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PDNS_API_URL=${PDNS_API_URL}
      - PDNS_API_KEY=${PDNS_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - PROXY_COUNT=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      pdns-api-proxy:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

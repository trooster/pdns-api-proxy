{% extends "admin/base.html" %}
{% block title %}2FA verificatie{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-phone fs-1 text-dark"></i>
          <h4 class="mt-2 mb-0">Twee-factor authenticatie</h4>
          <p class="text-muted small">Open je authenticator app en voer de code in</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login_2fa') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf }}">

          <div class="mb-4">
            <label for="code" class="form-label">6-cijferige code</label>
            <input type="text" class="form-control form-control-lg text-center"
                   id="code" name="code"
                   placeholder="000000"
                   autocomplete="one-time-code"
                   inputmode="numeric"
                   maxlength="6"
                   pattern="[0-9]{6}"
                   autofocus required>
          </div>

          <button type="submit" class="btn btn-dark w-100">
            <i class="bi bi-check-circle me-1"></i>Verifiëren
          </button>
        </form>

        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}" class="text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Terug naar inloggen
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
